name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave blank for auto)"
        required: false
        default: ""
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io

concurrency:
  group: build
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build
    needs: ci
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          no-cache: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}

      - name: Trigger infra promotion
        if: success()
        env:
          GH_TOKEN: ${{ secrets.INFRA_PROMOTE_PAT }}
        run: |
          gh workflow run promote-image.yml \
            --repo RigpaLabs/infra \
            --ref main \
            -f service=fathom \
            -f digest=${{ steps.build.outputs.digest }} \
            -f tag=${{ steps.version.outputs.version }}
