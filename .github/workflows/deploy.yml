name: Build & Deploy

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave blank for auto: vYYYYMMDD-sha)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & Push
    needs: ci
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="v$(date +%Y%m%d)-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to fathom-tokyo
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.FATHOM_TOKYO_SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.FATHOM_TOKYO_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via compose
        run: |
          ssh ${{ secrets.FATHOM_TOKYO_USER }}@${{ secrets.FATHOM_TOKYO_HOST }} "
            set -e
            cd ${{ secrets.BOTS_COMPOSE_DIR }}

            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            FATHOM_TAG=${{ needs.build.outputs.version }} docker compose pull fathom
            FATHOM_TAG=${{ needs.build.outputs.version }} docker compose up -d fathom

            echo 'Deploy OK: ${{ needs.build.outputs.version }}'
            docker ps --filter name=fathom --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
          "
