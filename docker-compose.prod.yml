services:
  fathom:
    image: ghcr.io/${GITHUB_REPO}:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: fathom
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - fathom-data:/app/data
      - ./config.toml:/app/config.toml:ro
    environment:
      - RUST_LOG=fathom=info
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  fathom-sync:
    image: ghcr.io/${GITHUB_REPO}-sync:${SYNC_TAG:-latest}
    container_name: fathom-sync
    restart: unless-stopped
    volumes:
      - fathom-data:/app/data
      - ./fathom-sync-config.toml:/app/config.toml:ro
    environment:
      - RUST_LOG=fathom_sync=info
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fathom-data:
